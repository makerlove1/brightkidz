<?xml version="1.0" encoding="UTF-8"?>
<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="3" dy="3" stdDeviation="3" flood-color="rgba(0,0,0,0.3)"/>
    </filter>
    <linearGradient id="gradient_pink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFC0CB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#cc8d98;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle for better visibility -->
  <circle cx="100" cy="100" r="95" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  
  <!-- Main shape with gradient -->
  <rect x="20" y="20" width="160" height="160" rx="20" fill="url(#gradient_pink)" stroke="#FFFFFF" stroke-width="4"/>
  
  <!-- Color name text -->
  <text x="100" y="100" text-anchor="middle" dominant-baseline="middle" 
        font-family="Arial, sans-serif" font-size="16" font-weight="bold" 
        fill="#333333" stroke="rgba(0,0,0,0.5)" stroke-width="0.5">
    Pink
  </text>
  
  
</svg>