<?xml version="1.0" encoding="UTF-8"?>
<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="3" dy="3" stdDeviation="3" flood-color="rgba(0,0,0,0.3)"/>
    </filter>
    <linearGradient id="gradient_navy_mixed" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000080;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00004d;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle for better visibility -->
  <circle cx="100" cy="100" r="95" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  
  <!-- Main shape with gradient -->
  <path d="M100,180 C100,180 20,120 20,80 C20,50 50,20 80,20 C90,20 100,30 100,30 C100,30 110,20 120,20 C150,20 180,50 180,80 C180,120 100,180 100,180 Z" fill="url(#gradient_navy_mixed)" stroke="#FFFFFF" stroke-width="4"/>
  
  <!-- Color name text -->
  <text x="100" y="100" text-anchor="middle" dominant-baseline="middle" 
        font-family="Arial, sans-serif" font-size="16" font-weight="bold" 
        fill="#FFFFFF" stroke="rgba(0,0,0,0.5)" stroke-width="0.5">
    Navy (Mixed)
  </text>
  
  
  <!-- Mixed indicator -->
  <circle cx="170" cy="30" r="15" fill="rgba(255,255,255,0.9)" stroke="#333" stroke-width="2"/>
  <text x="170" y="30" text-anchor="middle" dominant-baseline="middle" 
        font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#333">
    MIX
  </text>
  
</svg>