<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="rgba(0,0,0,0.3)"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="400" fill="linear-gradient(135deg, #667eea 0%, #764ba2 100%)"/>
  

  <!-- Red -->
  <rect x="13.333333333333336" y="20" width="106.66666666666669" height="160" rx="10" 
        fill="#FF0000" stroke="#FFFFFF" stroke-width="3" filter="url(#shadow)"/>
  <text x="66.66666666666669" y="100" text-anchor="middle" dominant-baseline="middle" 
        font-family="Arial, sans-serif" font-size="18" font-weight="bold" 
        fill="#FFFFFF" stroke="rgba(0,0,0,0.5)" stroke-width="0.5">
    Red
  </text>
  
  <!-- Blue -->
  <rect x="146.66666666666669" y="20" width="106.66666666666669" height="160" rx="10" 
        fill="#0000FF" stroke="#FFFFFF" stroke-width="3" filter="url(#shadow)"/>
