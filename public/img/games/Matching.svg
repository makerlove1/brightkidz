<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="200" rx="20" fill="url(#bgGradient)"/>
  
  <!-- Cards Grid -->
  <g transform="translate(50, 40)">
    <!-- Top row cards -->
    <rect x="0" y="0" width="40" height="40" rx="6" fill="white" stroke="#ddd" stroke-width="2"/>
    <rect x="60" y="0" width="40" height="40" rx="6" fill="url(#cardGradient)"/>
    
    <!-- Second row cards -->
    <rect x="0" y="50" width="40" height="40" rx="6" fill="url(#cardGradient)"/>
    <rect x="60" y="50" width="40" height="40" rx="6" fill="white" stroke="#ddd" stroke-width="2"/>
    
    <!-- Icons on flipped cards -->
    <text x="80" y="28" font-family="Arial" font-size="24" fill="white" text-anchor="middle">🐱</text>
    <text x="20" y="78" font-family="Arial" font-size="24" fill="white" text-anchor="middle">🐱</text>
    
    <!-- Question marks on unflipped cards -->
    <text x="20" y="28" font-family="Arial" font-size="24" fill="#666" text-anchor="middle">?</text>
    <text x="80" y="78" font-family="Arial" font-size="24" fill="#666" text-anchor="middle">?</text>
  </g>
  
  <!-- Title -->
  <text x="100" y="130" font-family="Arial" font-size="16" font-weight="bold" fill="white" text-anchor="middle">MATCHING</text>
  <text x="100" y="150" font-family="Arial" font-size="16" font-weight="bold" fill="white" text-anchor="middle">GAME</text>
  
  <!-- Sparkles -->
  <text x="30" y="30" font-family="Arial" font-size="12" fill="#ffd700">✨</text>
  <text x="170" y="40" font-family="Arial" font-size="12" fill="#ffd700">⭐</text>
  <text x="25" y="170" font-family="Arial" font-size="12" fill="#ffd700">✨</text>
  <text x="175" y="175" font-family="Arial" font-size="12" fill="#ffd700">⭐</text>
</svg>