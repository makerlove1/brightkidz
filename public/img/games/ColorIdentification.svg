<?xml version="1.0" encoding="UTF-8"?>
<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="3" dy="3" stdDeviation="3" flood-color="rgba(0,0,0,0.3)"/>
    </filter>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="200" rx="20" fill="url(#bg)"/>
  
  <!-- Question mark -->
  <circle cx="100" cy="60" r="35" fill="rgba(255,255,255,0.9)" filter="url(#shadow)"/>
  <text x="100" y="75" text-anchor="middle" dominant-baseline="middle" 
        font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="#333">
    ?
  </text>
  
  <!-- Color swatches -->
  <g transform="translate(30, 120)">
    <!-- Red swatch -->
    <rect x="0" y="0" width="35" height="35" rx="8" fill="#FF0000" stroke="white" stroke-width="3" filter="url(#shadow)"/>
    
    <!-- Blue swatch -->
    <rect x="45" y="0" width="35" height="35" rx="8" fill="#0000FF" stroke="white" stroke-width="3" filter="url(#shadow)"/>
    
    <!-- Yellow swatch -->
    <rect x="90" y="0" width="35" height="35" rx="8" fill="#FFFF00" stroke="white" stroke-width="3" filter="url(#shadow)"/>
    
    <!-- Green swatch -->
    <rect x="135" y="0" width="35" height="35" rx="8" fill="#00FF00" stroke="white" stroke-width="3" filter="url(#shadow)"/>
  </g>
  
  <!-- Arrow pointing from question to colors -->
  <path d="M100 95 L100 115 M95 110 L100 115 L105 110" 
        stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" 
        fill="none" filter="url(#shadow)"/>
  
  <!-- Game title -->
  <text x="100" y="180" text-anchor="middle" dominant-baseline="middle" 
        font-family="Arial, sans-serif" font-size="14" font-weight="bold" 
        fill="white" stroke="rgba(0,0,0,0.5)" stroke-width="0.5">
    Color ID
  </text>
</svg>